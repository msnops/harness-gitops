apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-app
  namespace: uat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-app
  template:
    metadata:
      labels:
        app: hello-app
    spec:
      containers:
        - name: hello-app
          image: ghcr.io/<your-github-username>/hello-app:v1.0   # <-- this gets bumped
          ports:
            - containerPort: 8080
          env:
            - name: APP_VERSION
              value: "v1.0"    # <-- this also gets bumped (shows in UI)